name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main] 

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://yousef-osama:$HF_TOKEN@huggingface.co/spaces/yousef-osama/medora-backend main
